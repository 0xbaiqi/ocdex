app:
  env: "dev"

log:
  level: "info"

redis:
  host: "your-redis-host:6379"
  password: "YOUR_REDIS_PASSWORD"
  db: 0

notify:
  telegram:
    enabled: false
    bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
    chat_ids:
      - "YOUR_CHAT_ID"
  feishu:
    enabled: false
    token: "YOUR_FEISHU_TOKEN"
  webhooks: []

exchange:
  binance:
    api_key: "YOUR_BINANCE_API_KEY"
    secret_key: "YOUR_BINANCE_SECRET_KEY"
  okx:
    api_key: "YOUR_OKX_API_KEY"
    secret_key: "YOUR_OKX_SECRET_KEY"
  fees:
    binance:
      spot_rate: 0.00075        # 现货买卖 0.075%
      futures_maker_rate: 0.00018  # 合约挂单 0.018%
      futures_taker_rate: 0.00045  # 合约吃单 0.045%
      withdrawal_cost: 0.0005

strategy:
  min_profit_usd: 0.5
  cex_fee_rate: 0.00075         # 现货 0.075%
  dex_fee_rate: 0.0025
  slippage: 1.0
  max_gas_price_gwei: 10.0
  trade_amount_usd: 30.0
  poll_interval_ms: 3000

execution:
  mode: "FUTURES_HEDGE" # Options: INVENTORY_SPOT, DEPOSIT_AND_SELL, FUTURES_HEDGE
  web:
    enabled: true
    host: "0.0.0.0"
    port: 8080
  deposit:
    address: "YOUR_BINANCE_DEPOSIT_ADDRESS"
    memo: ""
    poll_interval_sec: 5
    timeout_minutes: 30

wallet:
  mnemonic: "YOUR_WALLET_MNEMONIC_TWELVE_WORDS_HERE"

# 数据库配置
database:
  enabled: true
  host: "your-mysql-host"
  port: 3306
  username: "YOUR_DB_USER"
  password: "YOUR_DB_PASSWORD"
  db: "arb_dev"
  max_idle_conns: 5
  max_open_conns: 20

# 套利扫描器配置
scanner:
  enabled: true
  poll_interval_ms: 3000
  min_spread_percent: 0.1
  min_profit_usd: 1.0
  batch_size: 20
  max_tokens: 300
  min_liquidity_usd: 500

# 链配置
chain:
  bsc:
    enabled: true
    rpc: "https://YOUR_BSC_RPC_ENDPOINT"
    ws_url: "wss://YOUR_BSC_WS_ENDPOINT"
    multicall: "0xcA11bde05977b3631167028862bE2a173976CA11"
    router_v2: "0x10ED43C718714eb63d5aA57B78B54704E256024E"
    factory_v2: "0xcA143Ce32Fe78f1f7019d7d551a6402fC5350c73"
    factory_v3: "0x0BFbCF9fa4f9C56B0F40a671Ad40E0805A091865"
    wbnb: "0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c"
    usdt: "0x55d398326f99059fF775485246999027B3197955"
